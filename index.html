<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#121212" />
    <title>ThetaYield</title>
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>ThetaYield</h1>
        <p class="subtitle">Options Annualized Return</p>
      </header>

      <main>
        <section class="card input-section">
          <!-- Market Selection -->
          <div class="input-group">
            <label>Market</label>
            <div class="market-toggle">
              <input type="radio" id="market-us" name="market" value="US" checked>
              <label for="market-us">US</label>
              
              <input type="radio" id="market-hk" name="market" value="HK">
              <label for="market-hk">HK</label>
              
              <input type="radio" id="market-a" name="market" value="A">
              <label for="market-a">A-Share</label>

              <input type="radio" id="market-custom" name="market" value="Custom">
              <label for="market-custom">Custom</label>
            </div>
          </div>

          <!-- Expiration Date & DTE -->
          <div class="input-group">
            <label>Expiration / Days</label>
            <div style="display: flex; gap: 8px; width: 100%;">
              <input type="date" id="exp-date" style="flex: 2; padding-left: 8px; padding-right: 8px; min-width: 0; width: 100%;">
              <input type="number" id="dte" placeholder="DTE" inputmode="numeric" min="1" style="flex: 1; text-align: center; min-width: 0; width: 100%;">
            </div>
            <div class="quick-tags" id="quick-tags">
              <!-- Dynamically populated tags like "06/28 (3d)", "07/05 (10d)" -->
            </div>
          </div>

          <!-- Premium -->
          <div class="input-group">
            <label for="premium">Premium (Per Share)</label>
            <input type="number" id="premium" placeholder="0.00" inputmode="decimal" step="0.01">
          </div>

          <!-- Capital / Strike -->
          <div class="input-group">
            <label for="strike">Strike Price (Per Share)</label>
            <input type="number" id="strike" placeholder="0.00" inputmode="decimal" step="0.01">
          </div>
        </section>

        <section class="card result-section">
          <div class="result-box primary">
            <span class="result-label">Annualized Return</span>
            <div class="result-value" id="annualized-yield">--%</div>
          </div>
          <div class="result-box secondary">
            <span class="result-label">Absolute Return (ROC)</span>
            <div class="result-value" id="absolute-yield">--%</div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
